name: Build and Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore AI.FileOrganizer.slnx

      - name: Publish self-contained binary
        run: >-
          dotnet publish AI.FileOrganizer.CLI/AI.FileOrganizer.CLI.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish/${{ matrix.rid }}

      - name: Write clean runtime config template
        shell: pwsh
        run: |
          @"
          OpenAI:
            ApiKey: ""
            Model: "gpt-4o-mini"

          Anthropic:
            ApiKey: ""
            Model: "claude-haiku-4-5"

          OpenAICompatible:
            Endpoint: "http://localhost:1234/v1"
            ApiKey: "lm-studio"
            Model: "default"

          ThinkingLevel: "low"

          PersistMemory: true
          "@ | Set-Content -Path ./publish/${{ matrix.rid }}/config.yaml -NoNewline

      - name: Create zip package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./dist | Out-Null
          $zipName = "AI.FileOrganizer-${{ matrix.rid }}.zip"
          if (Test-Path "./dist/$zipName") { Remove-Item "./dist/$zipName" -Force }
          Compress-Archive -Path "./publish/${{ matrix.rid }}/*" -DestinationPath "./dist/$zipName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: ./dist/AI.FileOrganizer-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: ./release-assets

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*.zip
